syntax = "proto3";

// Package cluster.v1 is the wire contract between a load-test master and its
// workers. The master splits a run's virtual users across workers; each worker
// executes its shard and streams per-step results back for aggregation.
package cluster.v1;

option go_package = "github.com/chordpli/tmula/internal/cluster/clusterpb";

// ClusterService is served by every worker. A master dials each registered
// worker and drives shards through it.
service ClusterService {
  // RunShard asks the worker to execute its assigned slice of virtual users and
  // stream one ShardResult per request the users make. The stream completes
  // when the shard finishes (or the context is cancelled).
  rpc RunShard(RunShardRequest) returns (stream ShardResult);

  // Ping is a liveness probe used to confirm a worker is reachable.
  rpc Ping(PingRequest) returns (PingReply);
}

// RunShardRequest is fully self-contained: the scenario graph, API templates
// and target are carried as a single JSON document (spec_json) so the domain
// model is not duplicated in protobuf. The remaining fields parameterize which
// users this worker owns and how they walk the graph.
message RunShardRequest {
  // spec_json is the JSON encoding of the shared cluster.ShardSpec.
  string spec_json = 1;
  // user_offset is the index of the first virtual user this shard owns. It both
  // names the users (user-<offset+i>) and seeds the per-user RNG, so the global
  // run stays deterministic regardless of how users were partitioned.
  int32 user_offset = 2;
  // user_count is how many virtual users this shard runs.
  int32 user_count = 3;
  // seed is the run-wide base seed; per-user seed is seed + global user index.
  int64 seed = 4;
  // max_steps bounds each user's walk length.
  int32 max_steps = 5;
  // start_node is the graph node every user starts from.
  string start_node = 6;
}

// ShardResult is one observed request outcome from a worker. A non-2xx status
// is reported as data (not an error); error_class is set for transport/render
// failures or when no response was produced.
message ShardResult {
  // user_id is the virtual user that made the request (user-<global index>).
  string user_id = 1;
  // api_id is the API template id bound to the visited node, if any.
  string api_id = 2;
  // status_code is the HTTP status, or 0 when no response was received.
  int32 status_code = 3;
  // latency_ms is the client-observed round-trip latency in milliseconds.
  double latency_ms = 4;
  // error_class names the failure class (empty on success).
  string error_class = 5;
}

// PingRequest carries an optional caller-chosen nonce echoed back in the reply.
message PingRequest {
  string nonce = 1;
}

// PingReply echoes the request nonce and identifies the responding worker.
message PingReply {
  string nonce = 1;
  // worker_id identifies the responding worker (may be empty if unset).
  string worker_id = 2;
}
