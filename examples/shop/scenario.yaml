# Compact tmula scenario — one document that expands into a full run.
# Drive it with the CLI (no curl/jq, no separate server needed):
#
#   tmula run examples/shop/scenario.yaml --users 80
#
# `flow` steps run in order; consecutive steps are linked automatically and a
# step's `dependsOn` marks that edge as a required (never-skipped) dependency.
# For the full branching graph (browse → search/category → product → cart →
# checkout, with exit drop-offs at every stage), use shop/graph.json +
# shop/templates.json directly via the REST API or the web UI.
target: http://127.0.0.1:9000
allow: [127.0.0.1]
flow:
  - id: browse
    request: GET /browse
  - id: search
    request: GET /search
  - id: product
    request: GET /product
  - id: cart
    request: POST /cart
    body: '{"productId":"p7","qty":1}'
  - id: checkout
    request: POST /checkout
    body: '{"total":42}'
    dependsOn: cart

# Switch from fixed users to an organic, arrival-rate (open) load by adding:
#
# open:
#   rate: 200            # arrivals/sec  (or use from/to + rampSeconds for a ramp)
#   forSeconds: 30
#   thinkMs: [200, 800]  # pause between a user's steps
#   maxConcurrency: 2000
#
# and an optional persona mix (open model only):
#
# segments:
#   - { name: browser, weight: 0.7, start: browse }
#   - { name: buyer,   weight: 0.3, start: cart }
#
# Authenticate the run by injecting pre-created test accounts. Reference the
# token from a step header (e.g. Authorization: "Bearer {{.token}}"); closed
# users get a credential by index, open sessions by arrival index, wrapping when
# there are more users than entries. The secret is never serialized or persisted,
# so `tmula run` executes in-process for an authenticated run (a remote --engine
# cannot receive the secret). bootstrap-signup is a follow-up; only `pool` works
# here today.
#
# auth:
#   strategy: pool
#   users:
#     - { subject: alice, token: jwt-aaa }
#     - { subject: bob,   token: jwt-bbb }
